<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- Reduz chance do navegador manter HTML antigo após deploy -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="description" content="Painel administrativo DiPertin.">
  <!-- Google Sign-In (Flutter web / Identity) — mesmo client_id OAuth Web do Firebase -->
  <meta name="google-signin-client_id" content="939151024179-1aibtpudtpmvtki6g6du878i0j2012mj.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="DiPertin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>DiPertin</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    Painel: sem service worker (--pwa-strategy=none no build) para o domínio não
    ficar preso em main.dart.js antigo. Ainda removemos SWs antigos de deploys anteriores.
    https://github.com/flutter/flutter/issues/156910
  -->
  <script>
    (function () {
      function loadFlutter() {
        var s = document.createElement('script');
        s.src = 'flutter_bootstrap.js';
        s.async = true;
        document.body.appendChild(s);
      }
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          return Promise.all(regs.map(function (r) { return r.unregister(); }));
        }).then(loadFlutter, loadFlutter);
      } else {
        loadFlutter();
      }
    })();
  </script>
</body>
</html>
